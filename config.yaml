
symbol: "SPY"          # The instrument we're trading 
start:  "2010-01-01"   # Start of historical window
end:    "2024-12-31"   # End of historical window

data_path: "data/cache"  
log_level: "INFO"        

# Available: ma_crossover | ema_crossover | rsi | bollinger_bands | momentum | macd | mean_reversion
strategy: ma_crossover

strategies:

  # Simple SMA crossover: long when fast MA > slow MA.
  ma_crossover:
    fast: 50
    slow: 200

  # Exponential MA crossover: same logic but EMAs react faster to recent prices.
  ema_crossover:
    fast: 12
    slow: 26

  # RSI mean-reversion: long when oversold, flat when overbought.
  rsi:
    period:     14
    oversold:   30.0
    overbought: 70.0

  # Bollinger Bands mean-reversion: long at lower band, flat at upper band.
  bollinger_bands:
    period:  20
    num_std: 2.0

  # Rate-of-change momentum: long when price is higher than N bars ago.
  momentum:
    period: 20

  # MACD: long when MACD line crosses above its signal line.
  macd:
    fast:          12
    slow:          26
    signal_period: 9

  # Z-score mean-reversion: long when price is unusually cheap vs recent history.
  mean_reversion:
    period:  20
    z_entry: 1.5
    z_exit:  0.5

feed:
  symbol:   "BTCUSDT"    # Binance trading pair
  interval: "1h"         # candle interval

btc_backtest:
  start: "2022-01-01"
  end:   "2024-12-31"

testnet:
  order_qty: 0.001    

backtest:
  fast_ma:     50      # Fast MA window 
  slow_ma:     200     # Slow MA window
  fee_bps:     10.0    # One-way transaction cost 
  train_ratio: 0.7     # In-sample fraction

portfolio:
  symbols:
    - BTCUSDT
    - ETHUSDT

risk:
  vol_target:    0.20
  vol_lookback:  20
  max_drawdown:  0.15
  cooldown_bars: 20
  slippage_bps:  5.0
